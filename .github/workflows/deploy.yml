name: Build and Deploy

# This workflow runs on any push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/maksym-tomusiak/volynpack_backend:latest

  deploy:
    # This job waits for the 'build-and-push' job to finish
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}

          # This is the script that runs on your server
          script: |
            # Go to the directory
            cd opt/
            cd site/

            # Log in to GitHub Registry
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # --- THIS IS THE FIX ---
            # Create or overwrite the .env file with your secrets
            # This file will be automatically read by docker-compose
            echo "EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}" > .env
            echo "EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}" >> .env
            echo "EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}" >> .env
            echo "EMAIL_SENDER_EMAIL=${{ secrets.EMAIL_SENDER_EMAIL }}" >> .env
            echo "EMAIL_SENDER_PASSWORD=${{ secrets.EMAIL_SENDER_PASSWORD }}" >> .env
            echo "EMAIL_MAIL_API_KEY=${{ secrets.EMAIL_MAIL_API_KEY }}" >> .env
            # ---------------------

            docker-compose pull backend
            docker-compose up -d --no-deps backend
            docker system prune -f
