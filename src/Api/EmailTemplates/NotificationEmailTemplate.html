<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&family=Raleway:wght@700&display=swap');
        a {
            color: #92db1b !important;
            text-decoration: none;
        }
        a:hover {
            opacity: 80;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f7f9f8; font-family: 'Manrope', 'Helvetica', sans-serif; color: #0a2118; -webkit-font-smoothing: antialiased;">
<!-- Outer wrapper table for background -->
<table style="width: 100%; border-collapse: collapse; background-color: #f7f9f8; padding: 40px 20px;">
    <tr>
        <td style="text-align: center; padding: 40px 20px;">
            <!-- Main Card -->
            <table style="width: 100%; max-width: 600px; border-collapse: collapse; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(10, 33, 24, 0.05); border: 1px solid #c8cecb; margin: 0 auto;">

                <!-- Header with brand background -->
                <tr>
                    <td style="padding: 32px 40px; background-color: #0a2118; text-align: left;">
                        <h1 style="margin: 0; font-family: 'Raleway', sans-serif; font-size: 24px; color: #a3e635; letter-spacing: -0.5px; font-weight: 700;">VOLYNPACK</h1>
                    </td>
                </tr>

                <!-- Content Area -->
                <tr>
                    <td style="padding: 40px; text-align: left;">
                        <p style="margin: 0 0 24px 0; font-size: 18px; line-height: 1.5; font-weight: 600;">👋 Привіт!</p>
                        <p style="margin: 0 0 32px 0; font-size: 16px; line-height: 1.6; color: #35473f;">Ми підготували для вас нове оновлення:</p>

                        <!-- Message Block with lime accent -->
                        <div style="background-color: #f7f9f8; padding: 24px; border-radius: 12px; border-left: 4px solid #a3e635;">
                            <div style="margin: 0; font-size: 16px; line-height: 1.6; color: #0a2118;">{{Message}}</div>
                        </div>
                    </td>
                </tr>

                <!-- Footer Section -->
                <tr>
                    <td style="padding: 32px 40px; background-color: #e7eeeb; border-top: 1px solid #c8cecb; text-align: left;">
                        <p style="margin: 0 0 12px 0; font-size: 12px; color: #63716a; line-height: 1.5;">
                            Ви отримали цей лист, оскільки підписалися на розсилку новин Volynpack.
                        </p>
                        <a href="{{UnsubscribeLink}}" style="font-size: 12px; color: #065f46; text-decoration: underline; font-weight: 600; display: inline-block;">Скасувати підписку</a>
                    </td>
                </tr>
            </table>

            <!-- Post-card Copyright info -->
            <table style="width: 100%; max-width: 600px; border-collapse: collapse; margin: 0 auto;">
                <tr>
                    <td style="text-align: center; padding: 24px 0;">
                        <p style="margin: 0; font-size: 11px; color: #aeb6b2;">© 2026 Volynpack. Усі права захищено.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
